# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/miestanco?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

# Inicialización de datos (solo primera vez — desactivar cuando la BD ya tenga datos)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Servidor
server.port=8080
server.servlet.context-path=/api

# JWT
app.jwt.secret=MiEstancoSecretKey2025SuperSeguraCambiarEnProduccion123456789
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Upload de fotos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/fotos

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging para diagnosticar errores
logging.level.com.miestanco=DEBUG
logging.level.org.springframework.web=WARN
